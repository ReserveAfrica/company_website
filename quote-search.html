<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Search — Reserve Africa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17121F;
    --purple:#6D3FD9;
    --purple-deep:#4E2AA8;
    --purple-light:#A688F2;
    --purple-wash:#F1ECFC;
    --gold:#D7A44A;
    --gold-wash:#FBF2E3;
    --green:#2F9E5B;
    --green-wash:#EAF7EF;
    --surface:#F5F3FA;
    --white:#FFFFFF;
    --muted:#6B6478;
    --line:#E7E2F2;
    --radius:16px;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--font-body);
    background:var(--surface);
    color:var(--ink);
    padding:44px;
    min-height:100vh;
  }
  .wrap{ max-width:1240px; margin:0 auto; }

  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:30px;
    flex-wrap:wrap;
    gap:20px;
  }
  .topbar h1{
    font-family:var(--font-display);
    font-weight:600;
    font-size:29px;
    letter-spacing:-0.01em;
    margin-bottom:6px;
  }
  .topbar .sub{ font-size:14px; color:var(--muted); }
  .topbar-actions{ display:flex; align-items:center; gap:16px; }

  .btn{
    font-family:var(--font-body);
    font-weight:600;
    font-size:14px;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--white);
    color:var(--ink);
  }
  .btn-primary{ background:var(--purple); color:var(--white); border-color:transparent; box-shadow:0 10px 22px -8px rgba(109,63,217,.5); }

  .currency{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    font-weight:500;
    color:var(--muted);
  }
  .currency select{
    font-family:var(--font-body);
    font-weight:600;
    font-size:14px;
    color:var(--ink);
    padding:10px 16px;
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--white);
  }

  .panel{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px;
    margin-bottom:22px;
    box-shadow:0 16px 40px -28px rgba(23,18,31,.25);
  }
  .panel h2{
    font-family:var(--font-display);
    font-weight:600;
    font-size:19px;
    margin-bottom:24px;
  }
  .section-label{
    font-size:13px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--purple);
    margin-bottom:16px;
  }

  .field-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
  }
  .field-row:last-of-type{ margin-bottom:0; }
  .field label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13.5px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:8px;
  }
  .field label .info{
    width:15px; height:15px;
    color:var(--purple-light);
  }
  .field input, .field select{
    width:100%;
    padding:13px 15px;
    border:1px solid var(--line);
    border-radius:10px;
    font-family:var(--font-body);
    font-size:14.5px;
    color:var(--ink);
    background:var(--white);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field input::placeholder{ color:#A9A3BC; }
  .field input:focus, .field select:focus{
    border-color:var(--purple);
    box-shadow:0 0 0 3px rgba(109,63,217,.12);
  }

  .booking-row{
    display:grid;
    grid-template-columns:1fr 1fr 0.6fr 0.6fr 1fr;
    gap:20px;
    align-items:end;
  }
  .search-btn{
    padding:13px 15px;
    border-radius:10px;
    background:var(--purple);
    color:var(--white);
    font-family:var(--font-body);
    font-weight:700;
    font-size:15px;
    border:none;
    cursor:pointer;
    box-shadow:0 10px 22px -8px rgba(109,63,217,.5);
  }
  .next-leg{
    display:inline-block;
    margin-top:12px;
    font-size:13.5px;
    font-weight:600;
    color:var(--purple);
    text-decoration:underline;
    cursor:pointer;
  }
  .status{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
    color:var(--green);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .status svg{ width:14px; height:14px; }

  .results-panel{
    display:flex;
    align-items:center;
    gap:12px;
    padding:22px 32px;
  }
  .results-panel svg{ width:20px; height:20px; color:var(--purple); flex-shrink:0; }
  .results-panel p{ font-size:15px; font-weight:500; color:var(--ink); }
  .results-panel strong{ color:var(--purple); }

  @media (max-width:980px){
    .field-row{ grid-template-columns:1fr 1fr; }
    .booking-row{ grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div>
      <h1>Quote Search</h1>
<!--      <div class="sub">Only approved rates can be quoted</div>-->
    </div>
    <div class="topbar-actions">
<!--      <button class="btn">Reset Page</button>-->
      <div class="currency">
        Currency:
        <select>
          <option>USD</option>
          <option>ZAR</option>
          <option>EUR</option>
          <option>GBP</option>
        </select>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>Search Criteria</h2>

    <div class="section-label">Search Options</div>
    <div class="field-row">
      <div class="field">
        <label>Country</label>
        <select><option>Select Country</option></select>
      </div>
      <div class="field">
        <label>Park</label>
        <select><option>Select Park</option></select>
      </div>
      <div class="field">
        <label>Supplier Name</label>
        <input type="text" placeholder="Search supplier...">
      </div>
      <div class="field">
        <label>Accommodation Type
          <svg class="info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>
        </label>
        <select><option>All Types</option></select>
      </div>
    </div>

    <div class="section-label">Booking Details</div>
    <div class="booking-row">
      <div class="field">
        <label>Check-in</label>
        <input type="date" value="2026-07-27">
      </div>
      <div class="field">
        <label>Check-out</label>
        <input type="date" value="2026-07-31">
      </div>
      <div class="field">
        <label>Adults</label>
        <input type="number" value="2">
      </div>
      <div class="field">
        <label>Children</label>
        <input type="number" value="0">
      </div>
      <button class="search-btn">Search</button>
    </div>
    <a class="next-leg">+ next leg</a>
    <div class="status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      Ready to search
    </div>
  </div>

  <div class="panel results-panel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="5" width="17" height="15" rx="2"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5"/></svg>
    <p><strong>7 accommodation options</strong> found for Jul 27, 2026 to Jul 31, 2026</p>
  </div>

</div>
</body>
</html>
