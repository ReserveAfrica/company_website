<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Information Coming — Reserve Africa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17121F;
    --ink-soft:#231B34;
    --purple:#6D3FD9;
    --purple-deep:#4E2AA8;
    --purple-light:#A688F2;
    --purple-wash:#F1ECFC;
    --gold:#D7A44A;
    --surface:#F7F5FB;
    --white:#FFFFFF;
    --muted:#6B6478;
    --line:#E4DFF0;
    --radius:14px;
    --shadow:0 20px 50px -20px rgba(23,18,31,0.25);
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--white);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  img{max-width:100%; display:block;}
  a{color:inherit; text-decoration:none;}
  ul{list-style:none;}
  .wrap{
    max-width:1240px;
    margin:0 auto;
    padding:0 32px;
  }
  h1,h2,h3,h4{
    font-family:var(--font-display);
    font-weight:600;
    letter-spacing:-0.01em;
    line-height:1.1;
  }
  .eyebrow{
    font-family:var(--font-body);
    font-size:12.5px;
    font-weight:700;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--purple);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:'';
    width:22px;
    height:2px;
    background:var(--gold);
    display:inline-block;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:13px 26px;
    border-radius:999px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:14.5px;
    cursor:pointer;
    border:1px solid transparent;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
  }
  .btn-primary{
    background:var(--purple);
    color:var(--white);
    box-shadow:0 10px 24px -8px rgba(109,63,217,0.55);
  }
  .btn-primary:hover{ background:var(--purple-deep); transform:translateY(-1px); }
  .btn-ghost{
    background:transparent;
    border-color:rgba(255,255,255,0.28);
    color:var(--white);
  }
  .btn-ghost:hover{ background:rgba(255,255,255,0.1); }
  .btn-outline{
    background:transparent;
    border-color:var(--line);
    color:var(--ink);
  }
  .btn-outline:hover{ border-color:var(--purple); color:var(--purple); }

  /* ---------- NAV ---------- */
  header{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(23,18,31,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 0;
  }
  .logo{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo svg{ width:34px; height:34px; }
  .logo-text{
    display:flex;
    flex-direction:column;
    line-height:1;
  }
  .logo-text .r1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:19px;
    color:var(--white);
    letter-spacing:0.04em;
  }
  .logo-text .r2{
    font-family:var(--font-display);
    font-weight:500;
    font-size:11px;
    color:var(--purple-light);
    letter-spacing:0.32em;
  }
  .nav-links{
    display:flex;
    align-items:center;
    gap:34px;
  }
  .nav-links a{
    color:rgba(255,255,255,0.78);
    font-size:14.5px;
    font-weight:500;
    transition:color .15s ease;
  }
  .nav-links a:hover{ color:var(--white); }
  .nav-right{
    display:flex;
    align-items:center;
    gap:12px;
    position:relative;
  }

  /* ---------- HERO ---------- */
  .hero{
    background:var(--ink);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(109,63,217,0.35), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(215,164,74,0.12), transparent 50%);
    color:var(--white);
    padding:140px 0 120px;
    position:relative;
    overflow:hidden;
    text-align:center;
  }
  .hero h1{
    font-size:56px;
    margin:22px 0 24px;
  }
  .hero h1 span{ color:var(--purple-light); }
  .hero p.lead{
    font-size:19px;
    color:rgba(255,255,255,0.7);
    max-width:520px;
    margin:0 auto 40px;
  }
  .hero-ctas{
    display:flex;
    gap:14px;
    justify-content:center;
  }

  @media (max-width: 980px){
    .nav-links{ display:none; }
    .hero h1{ font-size:38px; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <nav>
      <div class="logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 40 L10 8 L28 8 C33 8 36 12 33 17 C31 20 27 21 24 21 L36 40" stroke="url(#g1)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="10" cy="8" r="3" fill="#A688F2"/>
          <circle cx="24" cy="21" r="3" fill="#A688F2"/>
          <circle cx="36" cy="40" r="3" fill="#A688F2"/>
          <defs>
            <linearGradient id="g1" x1="10" y1="8" x2="36" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#A688F2"/>
              <stop offset="1" stop-color="#6D3FD9"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-text">
          <span class="r1">RESERVE</span>
          <span class="r2">AFRICA</span>
        </div>
      </div>

      <ul class="nav-links">
        <li><a href="more-info.html">About</a></li>
        <li><a href="more-info.html">Platform</a></li>
        <li><a href="more-info.html">Product</a></li>
        <li><a href="more-info.html">Gallery</a></li>
        <li><a href="more-info.html">Contact</a></li>
      </ul>

      <div class="nav-right">
        <a href="https://lzeak3dpdd7klltavov5uqj76y0tesds.lambda-url.af-south-1.on.aws/" class="btn btn-ghost">Log in</a>
        <a href="more-info.html" class="btn btn-primary">Get started</a>
      </div>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <p class="eyebrow" style="justify-content:center;">Stay Tuned</p>
    <h1>More information <span>coming soon</span></h1>
    <p class="lead">We're working hard to bring you detailed information about our platform. Check back shortly for updates.</p>
    <div class="hero-ctas">
      <a href="index.html" class="btn btn-primary">Back to home</a>
    </div>
  </div>
</section>

</body>
</html>
