<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserve Africa Logo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 60px 80px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .label {
      color: #888;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 600 200"
      width="600"
      height="200"
      role="img"
      aria-label="Reserve Africa"
    >
      <!-- Stylised R mark -->
      <g fill="none" stroke="#7C3AED" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
        <!-- Left vertical stem -->
        <path d="M60 30 L60 180" />
        <!-- Top curved bowl of the R -->
        <path d="M60 30 Q150 30 150 85 Q150 130 90 130" />
        <!-- Diagonal leg -->
        <path d="M95 125 L165 185" />
        <!-- Inner accent stroke suggesting a stylised safari curve -->
        <path d="M85 60 Q125 75 120 110" stroke-width="12" opacity="0.9" />
      </g>
      <!-- Wordmark: RESERVE -->
      <text
        x="200"
        y="120"
        fill="#FFFFFF"
        font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="82"
        letter-spacing="4"
      >
        RESERVE
      </text>
      <!-- Tagline: AFRICA -->
      <text
        x="202"
        y="165"
        fill="#7C3AED"
        font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
        font-weight="500"
        font-size="34"
        letter-spacing="18"
      >
        AFRICA
      </text>
    </svg>
  </div>
  <div class="label">Reserve Africa Logo</div>
</body>
</html>
